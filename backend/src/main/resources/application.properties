# ========================
# SERVER CONFIGURATION
# ========================
server.port=8080
spring.application.name=JobBoard

# ========================
# H2 DATASOURCE (For Local Testing)
# ========================
spring.datasource.url=jdbc:h2:mem:jobboard_db
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ========================
# JWT CONFIGURATION
# ========================
app.jwt.secret=dGhpc0lzQVN1cGVyU2VjcmV0S2V5Rm9ySm9iQm9hcmRBcHBsaWNhdGlvbjIwMjZTcHJpbmdCb290
app.jwt.expiration-ms=86400000

# ========================
# FILE UPLOAD
# ========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads/resumes

# ========================
# CORS
# ========================
app.cors.allowed-origins=http://localhost:4200
